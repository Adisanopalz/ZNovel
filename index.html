<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Font Baru: Poppins untuk UI modern & Playfair untuk elemen sinematik -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #030712; /* Background luar super gelap */
            background-image: radial-gradient(circle at 50% 50%, #1f2937 0%, #030712 100%);
            margin: 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            height: 100dvh; /* Dynamic viewport untuk mobile (mengatasi address bar) */
            color: white;
        }

        .font-serif {
            font-family: 'Playfair Display', serif;
        }

        /* Game Container: Desain layaknya frame game modern */
        #game-container {
            width: 100%;
            height: 100%;
            max-width: 1400px; 
            position: relative;
            background-color: #000;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.9);
        }

        @media (min-width: 768px) {
            #game-container {
                height: 90vh;
                border-radius: 24px;
                border: 1px solid rgba(255, 255, 255, 0.1);
            }
        }

        /* --- 1. BACKGROUND THEMES (TIDAK DIUBAH SAMA SEKALI) --- */
        .bg-system { 
            background-image: url('https://mir-s3-cdn-cf.behance.net/project_modules/1400/588a44195922117.66168b374ece8.gif'); 
            background-size: cover; background-position: center;
        }
        .bg-awkward { 
            background-image: url('https://mir-s3-cdn-cf.behance.net/project_modules/1400/588a44195922117.66168b374ece8.gif'); 
            background-size: cover; background-position: center;
        }
        .bg-jogja { 
            background-image: url('https://mir-s3-cdn-cf.behance.net/project_modules/1400/588a44195922117.66168b374ece8.gif'); 
            background-size: cover; background-position: center;
        }
        .bg-eid { 
            background-image: url('https://mir-s3-cdn-cf.behance.net/project_modules/1400/588a44195922117.66168b374ece8.gif'); 
            background-size: cover; background-position: center;
        }
        
        @keyframes bgZoom {
            0% { transform: scale(1); }
            100% { transform: scale(1.1); }
        }
        .bg-active {
            animation: bgZoom 30s ease-in-out infinite alternate;
        }

        /* --- UI GLASSMORPHISM MODERN --- */
        .glass-panel {
            background: rgba(15, 23, 42, 0.65);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .glass-button {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glass-button:hover {
            background: rgba(16, 185, 129, 0.2);
            border-color: rgba(16, 185, 129, 0.5);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(16, 185, 129, 0.2);
        }

        /* Typewriter Cursor */
        .cursor {
            display: inline-block;
            width: 6px;
            height: 20px;
            background-color: #10b981;
            animation: blink 1s step-end infinite;
            vertical-align: text-bottom;
            margin-left: 4px;
            border-radius: 2px;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        /* --- CHARACTER SPRITE --- */
        #sprite-layer {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center; /* Default untuk mobile (di tengah) */
            align-items: flex-end; 
            pointer-events: none;
            z-index: 10;
        }

        /* Di Desktop, letakkan karakter agak ke kiri agar tidak menutupi teks */
        @media (min-width: 768px) {
            #sprite-layer {
                justify-content: flex-start;
                padding-left: 8%;
            }
        }

        #char-sprite {
            max-height: 60%; /* Skala lebih kecil untuk mobile agar tak tertutup kotak dialog */
            max-width: 90%;
            object-fit: contain;
            transform-origin: bottom center;
            transition: opacity 0.5s ease-in-out, transform 0.5s ease-out;
            filter: drop-shadow(0 0 20px rgba(0,0,0,0.5));
        }

        @media (min-width: 768px) {
            #char-sprite {
                max-height: 85%; /* Kembali besar di layar desktop */
            }
        }

        @keyframes breathe {
            0%, 100% { transform: scaleY(1) scaleX(1); }
            50% { transform: scaleY(1.015) scaleX(0.99); }
        }
        .anim-breathe { animation: breathe 4s ease-in-out infinite; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-10px) rotate(-1deg); }
            40% { transform: translateX(10px) rotate(1deg); }
            60% { transform: translateX(-10px) rotate(-1deg); }
            80% { transform: translateX(10px) rotate(1deg); }
        }
        .anim-shake { animation: shake 0.4s ease-in-out; }

        @keyframes pop {
            0% { transform: scale(0.95) translateY(20px); opacity: 0;}
            50% { transform: scale(1.02) translateY(-5px); opacity: 1;}
            100% { transform: scale(1) translateY(0); opacity: 1;}
        }
        .anim-pop { animation: pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        /* --- VN DIALOGUE UI --- */
        #dialogue-container {
            position: absolute;
            z-index: 30;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            width: 100%;
            bottom: 0;
            padding: 1rem;
        }

        /* Layout Dialogue Desktop: Mengambang di kanan bawah */
        @media (min-width: 768px) {
            #dialogue-container {
                width: 55%;
                right: 4%;
                bottom: 6%;
                padding: 0;
            }
        }

        .dialogue-box {
            position: relative;
            cursor: pointer;
            padding: 1.5rem 1.25rem 1.25rem 1.25rem; /* Padding efisien untuk mobile */
            border-radius: 20px;
            min-height: 120px;
        }

        @media (min-width: 768px) {
            .dialogue-box {
                padding: 2rem 2.5rem;
                border-radius: 24px;
                min-height: 160px;
            }
        }

        .name-badge {
            position: absolute;
            top: -14px;
            left: 16px;
            padding: 4px 16px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.85rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            z-index: 2;
        }

        @media (min-width: 768px) {
            .name-badge {
                top: -18px;
                left: 32px;
                padding: 6px 20px;
                font-size: 1rem;
            }
        }

        @keyframes box-bump {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }
        .anim-bump { animation: box-bump 0.2s ease-out; }

        @keyframes slide-up-fade {
            0% { transform: translateY(20px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        /* --- CHOICES UI --- */
        #choices-ui {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
        }
    </style>

    <script>
        lucide.createIcons();

        // --- AUDIO ENGINE ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;

        function initAudio() {
            if (!audioCtx) audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playTypeSound() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(800 + Math.random() * 200, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.015, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.02);
            osc.start(); osc.stop(audioCtx.currentTime + 0.02);
        }

        function playClickSound() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(400, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        }

        function playChoiceSound() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(523.25, audioCtx.currentTime); 
            osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        }

        function playMagicSound() {
            if (!audioCtx) return;
            const chords = [523.25, 659.25, 783.99, 1046.50];
            chords.forEach((freq, i) => {
                setTimeout(() => {
                    const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                    osc.connect(gain); gain.connect(audioCtx.destination);
                    osc.type = 'sine'; osc.frequency.value = freq;
                    gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.5);
                }, i * 100);
            });
        }

        // --- ENGINE STATE ---
        let currentNode = "start";
        let isTyping = false;
        let currentText = "";
        let typeInterval;
        let charIndex = 0;

        // --- DOM ELEMENTS ---
        const dialogueContainer = document.getElementById('dialogue-container');
        const dialogueBox = document.getElementById('dialogue-box');
        const speakerName = document.getElementById('speaker-name');
        const dialogueText = document.getElementById('dialogue-text');
        const continueIndicator = document.getElementById('continue-indicator');
        const choicesUI = document.getElementById('choices-ui');
        const choicesContainer = document.getElementById('choices-container');
        const bgLayer = document.getElementById('bg-layer');
        const charSprite = document.getElementById('char-sprite');
        const typeCursor = document.getElementById('type-cursor');

        // Preload Images
        function preloadImages() {
            Object.values(story).forEach(node => {
                if(node.image) {
                    const img = new Image();
                    img.src = node.image;
                }
            });
        }

        function startGame() {
            initAudio();
            preloadImages();
            
            // Animasi Start Screen menghilang
            const startScreen = document.getElementById('start-screen');
            startScreen.style.transition = "opacity 0.5s ease";
            startScreen.style.opacity = "0";
            
            setTimeout(() => {
                startScreen.style.display = 'none';
                dialogueContainer.style.display = 'block';
                dialogueContainer.style.animation = "slide-up-fade 0.5s ease-out forwards";
                playClickSound();
                loadNode("start");
            }, 500);
        }

        function setBackground(bgClass) {
            bgLayer.className = `absolute inset-0 bg-active ${bgClass}`;
            // Mempertahankan shadow gelap
            bgLayer.innerHTML = `<div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/20 to-transparent"></div>`;
        }

        function setSprite(imageSrc, animClass) {
            charSprite.style.opacity = '0';
            charSprite.classList.remove('anim-shake', 'anim-pop');
            
            setTimeout(() => {
                charSprite.src = imageSrc;
                charSprite.style.opacity = '1';
                
                if (animClass) {
                    void charSprite.offsetWidth; 
                    charSprite.classList.add(animClass);
                }
            }, 150); 
        }

        function loadNode(nodeId) {
            if (nodeId === "end") {
                showEndScreen();
                return;
            }

            const node = story[nodeId];
            currentNode = nodeId;

            if (node.action) node.action();

            // Set UI
            speakerName.innerText = node.speaker;
            speakerName.className = `name-badge bg-gradient-to-r ${node.color}`;
            
            if(node.image) setSprite(node.image, node.anim);
            
            dialogueBox.classList.remove('anim-bump');
            void dialogueBox.offsetWidth;
            dialogueBox.classList.add('anim-bump');
            
            currentText = node.text;
            startTyping();
        }

        function startTyping() {
            clearInterval(typeInterval);
            dialogueText.innerText = "";
            charIndex = 0;
            isTyping = true;
            continueIndicator.classList.add('hidden');
            typeCursor.style.display = 'inline-block';

            typeInterval = setInterval(() => {
                if (charIndex < currentText.length) {
                    dialogueText.innerText += currentText.charAt(charIndex);
                    charIndex++;
                    if(charIndex % 3 === 0) playTypeSound(); 
                } else {
                    finishTyping();
                }
            }, 30); 
        }

        function finishTyping() {
            clearInterval(typeInterval);
            dialogueText.innerText = currentText;
            isTyping = false;
            typeCursor.style.display = 'none';
            
            const node = story[currentNode];
            if (node.choices) {
                showChoices(node.choices);
            } else {
                continueIndicator.classList.remove('hidden');
            }
        }

        function showChoices(choices) {
            choicesContainer.innerHTML = '';
            document.getElementById('choice-question').innerText = "Tentukan Pilihanmu";
            
            choices.forEach((choice, index) => {
                const btn = document.createElement('button');
                btn.className = "glass-button w-full text-white font-medium py-3 px-5 md:py-4 md:px-6 rounded-xl md:rounded-2xl text-left text-base md:text-lg flex items-center justify-between group opacity-0";
                btn.style.animation = `slide-up-fade 0.4s ease-out forwards ${index * 0.15}s`;
                
                btn.innerHTML = `
                    <span>${choice.text}</span>
                    <i data-lucide="arrow-right" class="w-4 h-4 md:w-5 md:h-5 text-gray-400 group-hover:text-emerald-400 transition-transform group-hover:translate-x-1"></i>
                `;
                
                btn.onclick = (e) => {
                    e.stopPropagation();
                    playChoiceSound();
                    choicesUI.style.opacity = '0';
                    setTimeout(() => {
                        choicesUI.classList.add('hidden');
                        choicesUI.style.opacity = '1';
                        loadNode(choice.next);
                    }, 300);
                };
                choicesContainer.appendChild(btn);
            });
            
            lucide.createIcons();
            choicesUI.classList.remove('hidden');
        }

        // Handle clicks
        dialogueBox.addEventListener('click', () => {
            if (choicesUI.classList.contains('hidden') === false) return; 
            
            if (isTyping) {
                finishTyping();
            } else {
                const node = story[currentNode];
                if (node.next) {
                    playClickSound();
                    loadNode(node.next);
                }
            }
        });

        function showEndScreen() {
            dialogueContainer.style.display = 'none';
            charSprite.style.opacity = '0';
            
            choicesContainer.innerHTML = `
                <div class="mt-2 md:mt-4">
                    <button onclick="location.reload()" class="bg-white hover:bg-emerald-400 text-gray-900 hover:text-white font-bold py-3 px-8 md:py-4 md:px-10 rounded-full text-base md:text-lg transition-all hover:scale-105 shadow-[0_0_20px_rgba(255,255,255,0.2)] hover:shadow-[0_0_30px_rgba(16,185,129,0.5)] flex items-center gap-2 mx-auto">
                        <i data-lucide="rotate-ccw" class="w-4 h-4 md:w-5 md:h-5"></i> ULANG MEMORI
                    </button>
                </div>
            `;
            document.getElementById('choice-question').innerText = "Memori Selesai.";
            document.getElementById('choice-question').className = "font-serif text-emerald-400 font-bold mb-2 md:mb-4 text-3xl md:text-5xl drop-shadow-lg";
            
            choicesUI.classList.remove('hidden');
            lucide.createIcons();
        }

        // --- CONFETTI SYSTEM ---
        const confCanvas = document.getElementById('confetti-canvas');
        const confCtx = confCanvas.getContext('2d');
        let confWidth, confHeight;
        let conficles = [];
        let reqAnim;

        function resizeConf() {
            const container = document.getElementById('game-container');
            confWidth = confCanvas.width = container.clientWidth;
            confHeight = confCanvas.height = container.clientHeight;
        }
        window.addEventListener('resize', resizeConf); 
        resizeConf();

        const colors = ['#FBBF24', '#FCD34D', '#10B981', '#34D399', '#ffffff'];

        class Confetti {
            constructor() {
                this.x = Math.random() * confWidth;
                this.y = Math.random() * confHeight - confHeight;
                this.size = Math.random() * 8 + 4;
                this.vx = (Math.random() - 0.5) * 3;
                this.vy = Math.random() * 2 + 1.5;
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.rot = Math.random() * 360;
                this.rotSpeed = (Math.random() - 0.5) * 5;
            }
            update() {
                this.x += this.vx; this.y += this.vy; this.rot += this.rotSpeed;
                if(this.y > confHeight) { this.y = -10; this.x = Math.random() * confWidth; }
            }
            draw() {
                confCtx.save();
                confCtx.translate(this.x, this.y); confCtx.rotate(this.rot * Math.PI / 180);
                confCtx.fillStyle = this.color;
                if(Math.random() > 0.5) {
                    confCtx.fillRect(-this.size/2, -this.size/2, this.size, this.size);
                } else {
                    confCtx.beginPath();
                    confCtx.arc(0, 0, this.size/2, 0, Math.PI * 2);
                    confCtx.fill();
                }
                confCtx.restore();
            }
        }

        function startConfetti() {
            cancelAnimationFrame(reqAnim);
            resizeConf(); 
            conficles = [];
            for(let i=0; i<80; i++) conficles.push(new Confetti());
            animateConfetti();
        }

        function animateConfetti() {
            confCtx.clearRect(0, 0, confWidth, confHeight);
            conficles.forEach(c => { c.update(); c.draw(); });
            reqAnim = requestAnimationFrame(animateConfetti);
        }
    </script>
</body>
</html>
